<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharper Margins — Edge Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117;
    --bg2: #1a1d27;
    --bg3: #22263a;
    --border: #2e3347;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --green: #22c55e;
    --orange: #f97316;
    --yellow: #eab308;
    --red: #ef4444;
    --blue: #3b82f6;
    --purple: #a855f7;
    --accent: #6366f1;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--accent);
  }
  .header .meta { color: var(--text-muted); font-size: 12px; }
  .stats-bar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    gap: 24px;
    align-items: center;
    flex-wrap: wrap;
  }
  .stat-item { display: flex; align-items: center; gap: 6px; }
  .stat-label { color: var(--text-muted); font-size: 12px; }
  .stat-value { font-weight: 600; }
  .filters {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .search-input {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    width: 160px;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .container { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }
  .section-header {
    margin: 24px 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .section-header h2 { font-size: 16px; font-weight: 600; }
  .section-desc { color: var(--text-muted); font-size: 12px; margin-top: 4px; }
  .low-conf-header h2 { color: var(--yellow); }
  .signals-table, .history-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-bottom: 8px;
  }
  .signals-table th, .history-table th {
    background: var(--bg3);
    color: var(--text-muted);
    font-weight: 500;
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .sortable { cursor: pointer; user-select: none; }
  .sortable:hover { color: var(--text); }
  .signals-table td, .history-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .signal-row { cursor: pointer; transition: background 0.1s; }
  .signal-row:hover { background: var(--bg3); }
  .sport-badge {
    display: inline-block;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--text-muted);
  }
  .game-cell { max-width: 220px; }
  .game-time { color: var(--text-muted); font-size: 11px; margin-top: 2px; }
  .edge-green { color: var(--green); }
  .edge-orange { color: var(--orange); }
  .edge-yellow { color: var(--yellow); }
  .detail-row td { padding: 0; }
  .detail-panel {
    background: var(--bg3);
    border-left: 3px solid var(--accent);
    padding: 16px 20px;
    font-size: 13px;
  }
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 12px;
  }
  @media (max-width: 700px) { .detail-grid { grid-template-columns: 1fr; } }
  .detail-section h4 { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
  .factor-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .factor-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2px 8px;
    font-size: 11px;
    font-family: monospace;
  }
  .kalshi-confirm { color: var(--green); font-size: 12px; }
  .kalshi-contra { color: var(--yellow); font-size: 12px; }
  .kalshi-none { color: var(--text-muted); font-size: 12px; }
  .missing-factors {
    color: var(--yellow);
    font-size: 11px;
    margin-top: 6px;
  }
  code {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-family: monospace;
    font-size: 12px;
  }
  .stub-grid {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .stub-sport {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    min-width: 200px;
  }
  .stub-sport h4 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .stub-sport ul { list-style: none; padding: 0; }
  .stub-sport li { font-size: 12px; padding: 3px 0; border-bottom: 1px solid var(--border); }
  .stub-sport li:last-child { border-bottom: none; }
  .no-games { color: var(--text-muted); font-size: 12px; }
  .wl-record {
    display: flex;
    gap: 16px;
    margin-top: 6px;
    font-size: 13px;
  }
  .result-win { color: var(--green); font-weight: 600; }
  .result-loss { color: var(--red); font-weight: 600; }
  .result-push { color: var(--text-muted); font-weight: 600; }
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin: 16px 0;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <h1>SHARPER MARGINS</h1>
  <div class="meta">
    <span id="gen-time" data-iso="2026-07-13T21:56:13.563393+00:00">Generated: 2026-07-13 21:56 UTC</span>
    &nbsp;
    <button class="filter-btn" onclick="exportCSV()" style="font-size:11px;padding:3px 10px">Export CSV</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-item">
    <span class="stat-label">Active Signals:</span>
    <span class="stat-value">0</span>
  </div>
  <div class="stat-item">
    <span class="stat-label">🟢 20%+:</span>
    <span class="stat-value edge-green">0</span>
  </div>
  <div class="stat-item">
    <span class="stat-label">🟠 15–19%:</span>
    <span class="stat-value edge-orange">0</span>
  </div>
  <div class="stat-item">
    <span class="stat-label">🟡 10–14%:</span>
    <span class="stat-value edge-yellow">0</span>
  </div>
</div>

<div class="filters" id="filters">
  <button class="filter-btn active" onclick="filterSport('all', this)">All Sports</button>

  <span style="color:var(--text-muted); padding: 0 4px;">|</span>
  <button class="filter-btn active-book" onclick="filterBook('all', this)">All Books</button>
  <button class="filter-btn" onclick="filterBook('DraftKings', this)">DraftKings</button>
  <button class="filter-btn" onclick="filterBook('FanDuel', this)">FanDuel</button>
  <span style="color:var(--text-muted); padding: 0 4px;">|</span>
  <input class="search-input" type="text" placeholder="Search teams..." oninput="searchSignals(this.value)">
</div>

<div class="container">

  <div class="section-header">
    <h2>Active Signals</h2>
    <p class="section-desc">Edges ≥ 10% — our estimated probability vs vig-adjusted implied. Click row to expand.</p>
  </div>

  <div class="empty-state"><p>No edges &ge; 10% identified today. Check back after next model run.</p></div>

  

  

  

  

</div>

<script>
// --- Row expand/collapse ---
var openSigId = null;
function toggleRow(sigId) {
  if (openSigId !== null && openSigId !== sigId) {
    var prev = document.getElementById('detail-' + openSigId);
    if (prev) prev.style.display = 'none';
  }
  var row = document.getElementById('detail-' + sigId);
  if (!row) return;
  var showing = row.style.display !== 'none';
  row.style.display = showing ? 'none' : 'table-row';
  openSigId = showing ? null : sigId;
}

// --- Filtering ---
var activeSport = 'all';
var activeBook = 'all';
var searchTerm = '';

function filterSport(sport, btn) {
  activeSport = sport;
  document.querySelectorAll('.filter-btn').forEach(function(b) {
    if (b.getAttribute('onclick') && b.getAttribute('onclick').includes('filterSport')) {
      b.classList.toggle('active', b.textContent.trim() === sport || (sport === 'all' && b.textContent.trim() === 'All Sports'));
    }
  });
  applyFilters();
}

function filterBook(book, btn) {
  activeBook = book;
  document.querySelectorAll('.filter-btn').forEach(function(b) {
    if (b.getAttribute('onclick') && b.getAttribute('onclick').includes('filterBook')) {
      b.classList.toggle('active', b.textContent.trim() === book || (book === 'all' && b.textContent.trim() === 'All Books'));
    }
  });
  applyFilters();
}

function searchSignals(val) {
  searchTerm = val.toLowerCase();
  applyFilters();
}

function applyFilters() {
  document.querySelectorAll('.signal-row').forEach(function(row) {
    var sport = row.dataset.sport || '';
    var book = row.dataset.book || '';
    var text = row.textContent.toLowerCase();
    var sigId = row.dataset.sigid;
    var sportMatch = activeSport === 'all' || sport === activeSport;
    var bookMatch = activeBook === 'all' || book === activeBook;
    var searchMatch = !searchTerm || text.includes(searchTerm);
    var visible = sportMatch && bookMatch && searchMatch;
    row.style.display = visible ? '' : 'none';
    if (!visible && sigId) {
      var detail = document.getElementById('detail-' + sigId);
      if (detail) detail.style.display = 'none';
    }
  });
}

// --- Sorting ---
var sortState = {};
function sortTable(tableId, colIdx) {
  var table = document.getElementById(tableId);
  if (!table) return;
  var key = tableId + '-' + colIdx;
  sortState[key] = sortState[key] === 'desc' ? 'asc' : 'desc';
  var asc = sortState[key] === 'asc';

  var tbody = table.querySelector('tbody');
  var signalRows = Array.from(tbody.querySelectorAll('tr.signal-row'));

  // Build sigId -> detail row map before reordering
  var detailMap = {};
  signalRows.forEach(function(r) {
    var sid = r.dataset.sigid;
    if (sid) {
      var d = document.getElementById('detail-' + sid);
      if (d) detailMap[sid] = d;
    }
  });

  signalRows.sort(function(a, b) {
    var ca = a.querySelectorAll('td')[colIdx];
    var cb = b.querySelectorAll('td')[colIdx];
    var va = ca ? (ca.dataset.sortval !== undefined ? parseFloat(ca.dataset.sortval) : ca.textContent.trim()) : '';
    var vb = cb ? (cb.dataset.sortval !== undefined ? parseFloat(cb.dataset.sortval) : cb.textContent.trim()) : '';
    if (typeof va === 'number' && typeof vb === 'number') {
      return asc ? va - vb : vb - va;
    }
    return asc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
  });

  signalRows.forEach(function(r) {
    tbody.appendChild(r);
    var sid = r.dataset.sigid;
    if (sid && detailMap[sid]) tbody.appendChild(detailMap[sid]);
  });
}

// --- History load-more ---
var historyPage = 0;
function loadMoreHistory() {
  historyPage++;
  var pageSize = 50;
  document.querySelectorAll('.history-entry').forEach(function(r) {
    var p = parseInt(r.dataset.page || '0');
    if (p <= historyPage) r.style.display = '';
  });
  var remaining = document.querySelectorAll('.history-entry[style="display: none;"]').length;
  var btn = document.getElementById('load-more-btn');
  if (btn) {
    if (remaining === 0) btn.style.display = 'none';
    else btn.textContent = 'Load more (' + remaining + ' remaining)';
  }
}

// --- CSV export ---
function exportCSV() {
  var rows = [['Sport','Game','Book','Edge','Our %','Implied %','Recommendation']];
  document.querySelectorAll('.signal-row').forEach(function(r) {
    if (r.style.display === 'none') return;
    var cells = r.querySelectorAll('td');
    if (cells.length < 7) return;
    var edge = cells[3].dataset.sortval || cells[3].textContent.trim();
    rows.push([
      '"' + (cells[0].textContent.trim().replace(/"/g,'""')) + '"',
      '"' + (cells[1].textContent.trim().replace(/"/g,'""')) + '"',
      '"' + (cells[2].textContent.trim().replace(/"/g,'""')) + '"',
      '"' + edge + '"',
      '"' + (cells[4].textContent.trim().replace(/"/g,'""')) + '"',
      '"' + (cells[5].textContent.trim().replace(/"/g,'""')) + '"',
      '"' + (cells[6].textContent.trim().replace(/"/g,'""')) + '"',
    ]);
  });
  var csv = rows.map(function(r) { return r.join(','); }).join('\n');
  var blob = new Blob([csv], {type: 'text/csv'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sharper-margins-signals.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

// --- Relative time ---
function updateRelativeTime() {
  var el = document.getElementById('gen-time');
  if (!el) return;
  var iso = el.dataset.iso;
  if (!iso) return;
  var diff = Math.floor((Date.now() - new Date(iso)) / 60000);
  var label = diff < 1 ? 'just now' : diff < 60 ? diff + 'm ago' : Math.floor(diff / 60) + 'h ago';
  el.title = 'Generated: ' + iso;
  el.textContent = 'Updated ' + label;
}

// --- Init ---
document.addEventListener('DOMContentLoaded', function() {
  // Hide history rows past page 0
  document.querySelectorAll('.history-entry').forEach(function(r) {
    if (parseInt(r.dataset.page || '0') > 0) r.style.display = 'none';
  });
  updateRelativeTime();
  setInterval(updateRelativeTime, 60000);
});
</script>

</body>
</html>
