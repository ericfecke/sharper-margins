<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharper Margins — Edge Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f1117;
    color: #e2e8f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .init-state {
    text-align: center;
    padding: 48px;
    color: #94a3b8;
  }
  .init-state h1 { color: #6366f1; font-size: 28px; margin-bottom: 16px; letter-spacing: 0.05em; }
  .init-state p { font-size: 14px; margin-top: 8px; }
</style>
</head>
<body>
<div class="init-state">
  <h1>SHARPER MARGINS</h1>
  <p>Dashboard initializing — first run cycle will populate signals.</p>
  <p style="margin-top: 16px; font-size: 12px;">Run <code>python tools/run_cycle.py</code> to generate the first report.</p>
</div>
</body>
</html>
